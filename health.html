<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPE Kafka | Health Check</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
    <script src="js/utils.js"></script>
    <script src="js/charms.js"></script>
</head>
<body>

    <nav class="home-nav">
        <a href="index.html" class="home-link" title="Back to Home">
            <i class="fas fa-home"></i>
        </a>
        <div class="menu-container">
            <a class="home-link" title="Open Options" id="menuTrigger">
                <img id="productLogo" width="32px" height="32px" src="static/img/kafka.png" alt="Kafka Logo">
            </a>
            
            <ul class="context-menu" id="contextMenu">
            </ul>
        </div>
    </nav>

    <header>
        <h1>Health Check</h1>
    </header>

    <main id="main" class="container">  
    </main>
    <script>
        function productChangedCallback(product) {
            data = {
                "machine": charms.filter((x) => x.group == product && x.substrate == "machine"),
                "k8s": charms.filter((x) => x.group == product && x.substrate == "k8s")
            }
            document.getElementById("main").innerHTML = "";
            generateDom("Machine", data.machine);
            generateDom("K8s", data.k8s)
        }
    </script>
    <script src="js/productContext.js"></script>
    <script>
    function generateDom(subs, data) {
        const container = document.getElementById('main');
        
        let html = `
        <div class="section-title">
            <h2>${subs} Charms</h2>
        </div>
        `;

        data.forEach(item => {
            ch_badge_svg = typeof item.channel == "undefined" ? `badge.svg` : `badge.svg?channel=${item.channel}`;
            html += `
            <div class="card">
                <h3>${betterTitle(item.name)}</h3>
                <div class="badge-container">
                    <a href="https://charmhub.io/${item.name}"><img src="https://charmhub.io/${item.name}/${ch_badge_svg}" alt="CharmHub"></a>
                    <a href="${item.repo}/actions/workflows/${item.defaults.release_workflow}"><img src="${item.repo}/actions/workflows/${item.defaults.release_workflow}/badge.svg" alt="Release"></a>
                    <a href="${item.repo}/actions/workflows/${item.defaults.ci_workflow}"><img src="${item.repo}/actions/workflows/${item.defaults.ci_workflow}/badge.svg" alt="Tests"></a>
                </div>
            </div>
            `;
        });

        container.innerHTML += html;
    }
    populateProducts();
    productChangedCallback(selectedProduct)
    </script>
</body>
</html>
